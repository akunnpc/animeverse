name: Build APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      build_release:
        description: "Build signed release APK juga?"
        type: boolean
        default: false

jobs:
  build:
    name: Build Debug (dan Release jika diminta)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Repo ini tidak menyertakan gradlew, jadi kita generate wrapper-nya
      # sesuai versi AGP/Gradle yang dipakai project (cek gradle/libs.versions.toml).
      - name: Generate Gradle Wrapper (jika belum ada)
        run: |
          if [ ! -f "./gradlew" ]; then
            echo "gradlew tidak ditemukan, generate wrapper..."
            gradle wrapper --gradle-version 9.3.1
          fi
          chmod +x ./gradlew

      # Secrets Gradle Plugin butuh file .env, fallback ke .env.example kalau
      # secret belum diset supaya build tidak gagal.
      - name: Siapkan file .env
        run: |
          if [ -n "${{ secrets.GEMINI_API_KEY }}" ]; then
            echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
          else
            cp .env.example .env
            echo "⚠️ GEMINI_API_KEY secret belum diset, pakai placeholder dari .env.example"
          fi

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk

      # ===== RELEASE (opsional, jalan hanya kalau di-trigger manual + keystore secret tersedia) =====
      - name: Decode keystore untuk release
        if: ${{ github.event.inputs.build_release == 'true' }}
        run: |
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "❌ Secret KEYSTORE_BASE64 belum diset, lewati build release."
            echo "SKIP_RELEASE=true" >> $GITHUB_ENV
          else
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > my-upload-key.jks
            echo "SKIP_RELEASE=false" >> $GITHUB_ENV
          fi

      - name: Build Release APK
        if: ${{ github.event.inputs.build_release == 'true' && env.SKIP_RELEASE == 'false' }}
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/my-upload-key.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload Release APK
        if: ${{ github.event.inputs.build_release == 'true' && env.SKIP_RELEASE == 'false' }}
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk
          
